[package]
name = "zk_attest"
type = "bin"
authors = ["apertrue"]
description = "zkAppAttest: ZK proof that a private App Attest credCert, issued by Apple's App Attestation CA 1, attests this app over the public challenge (docs/ZK_ATTEST.md)"

[dependencies]
bignum = { tag = "v0.10.0", git = "https://github.com/noir-lang/noir-bignum" }
poseidon = { tag = "v0.3.0", git = "https://github.com/noir-lang/poseidon" }
sha256 = { tag = "v0.3.0", git = "https://github.com/noir-lang/sha256" }
